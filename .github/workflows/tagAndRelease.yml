name: Tag and Release

on:
  push:
    branches: ['master']
    paths-ignore: ['*.md']

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Setup build environment
        uses: start9labs/shared-workflows/.github/actions/setup-build-env@master

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Find or create developer signing key
        run: |
          if [ -n "${{ secrets.DEV_KEY }}" ]; then
            mkdir -p ~/.startos
            printf '%s' "${{ secrets.DEV_KEY }}" > ~/.startos/developer.key.pem
          else
            start-cli init-key
          fi
        shell: bash

      - name: Build explorer images locally from upstream source
        run: |
          set -euo pipefail

          UPSTREAM_TAG=3.8.16
          UPSTREAM_DIR=/tmp/bitcoin-cash-explorer-upstream
          rm -rf "$UPSTREAM_DIR"
          git clone --depth 1 --branch "$UPSTREAM_TAG" https://github.com/BitcoinCash1/bitcoin-cash-explorer.git "$UPSTREAM_DIR"

          # Prepare upstream frontend/backend directories the same way upstream Docker CI does.
          (cd "$UPSTREAM_DIR" && ./docker/init.sh "$UPSTREAM_TAG")

          cat > "$UPSTREAM_DIR/docker/frontend/Dockerfile.startos" <<'EOF'
          FROM node:24-bookworm AS builder

          ARG commitHash
          ENV DOCKER_COMMIT_HASH=${commitHash}
          ENV CYPRESS_INSTALL_BINARY=0
          ENV NODE_ENV=production
          ENV SKIP_SYNC=1

          WORKDIR /build
          COPY . .
          RUN apt-get update
          RUN apt-get install -y build-essential rsync
          RUN corepack enable
          RUN cp explorer-frontend-config.sample.json explorer-frontend-config.json
          RUN pnpm install
          RUN pnpm build

          FROM nginx:1.29.4-alpine

          WORKDIR /patch

          COPY --from=builder /build/entrypoint.sh .
          COPY --from=builder /build/wait-for .
          COPY --from=builder /build/dist/explorer /var/www/explorer
          COPY --from=builder /build/nginx.conf /etc/nginx/
          COPY --from=builder /build/nginx-explorer.conf /etc/nginx/conf.d/

          RUN chmod +x /patch/entrypoint.sh
          RUN chmod +x /patch/wait-for

          RUN chown -R 1000:1000 /patch && chmod -R 755 /patch && \
                  chown -R 1000:1000 /var/cache/nginx && \
                  chown -R 1000:1000 /var/log/nginx && \
                  chown -R 1000:1000 /etc/nginx/nginx.conf && \
                  chown -R 1000:1000 /etc/nginx/conf.d && \
                  chown -R 1000:1000 /var/www/explorer

          RUN touch /var/run/nginx.pid && \
                  chown -R 1000:1000 /var/run/nginx.pid

          USER 1000

          ENTRYPOINT ["/patch/entrypoint.sh"]
          CMD ["nginx", "-g", "daemon off;"]
          EOF

          cat > "$UPSTREAM_DIR/docker/backend/Dockerfile.startos" <<'EOF'
          FROM node:24-bookworm AS builder

          ARG commitHash
          ENV MEMPOOL_COMMIT_HASH=${commitHash}
          ENV NODE_ENV=production
          ENV PATH="/root/.cargo/bin:${PATH}"

          RUN apt-get update && apt-get install -y curl build-essential pkg-config libssl-dev ca-certificates
          RUN curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
          RUN corepack enable

          WORKDIR /build
          COPY --chown=node:node . .
          COPY --chown=node:node --from=backend . .
          COPY --chown=node:node --from=rustgbt . ../rust/
          ENV FD=/build/rust-gbt

          RUN pnpm preinstall
          RUN pnpm install --prod
          RUN pnpm package

          FROM node:24-bookworm-slim AS runtime

          ENV NODE_OPTIONS=--max-old-space-size=16384
          ENV NODE_ENV=production

          WORKDIR /backend

          RUN chown 1000:1000 ./
          COPY --from=builder --chown=1000:1000 /build/package ./package/
          COPY --from=builder --chown=1000:1000 /build/explorer-config-template.json /build/start.sh /build/wait-for-it.sh ./
          RUN mv explorer-config-template.json explorer-config.json

          HEALTHCHECK --interval=40s --timeout=20s --start-period=40s --retries=5 \
            CMD node package/healthcheck.js

          USER 1000

          EXPOSE 8999

          CMD ["/backend/start.sh"]
          EOF

          SHORT_SHA=$(git rev-parse --short HEAD)

          docker build \
            --build-arg commitHash="$SHORT_SHA" \
            -t registry.melroy.org/bitcoincash/bitcoin-cash-explorer/explorer-frontend:"$UPSTREAM_TAG" \
            -f "$UPSTREAM_DIR/docker/frontend/Dockerfile.startos" \
            "$UPSTREAM_DIR/frontend"

          docker build \
            --build-context backend="$UPSTREAM_DIR/backend" \
            --build-context rustgbt="$UPSTREAM_DIR/rust" \
            --build-arg commitHash="$SHORT_SHA" \
            -t registry.melroy.org/bitcoincash/bitcoin-cash-explorer/explorer-backend:"$UPSTREAM_TAG" \
            -f "$UPSTREAM_DIR/docker/backend/Dockerfile.startos" \
            "$UPSTREAM_DIR/backend"

          docker image inspect registry.melroy.org/bitcoincash/bitcoin-cash-explorer/explorer-frontend:"$UPSTREAM_TAG" >/dev/null
          docker image inspect registry.melroy.org/bitcoincash/bitcoin-cash-explorer/explorer-backend:"$UPSTREAM_TAG" >/dev/null

          echo "Pushing images to registry.melroy.org..."
          echo "${{ secrets.REGISTRY_MELROY_PASS }}" | docker login registry.melroy.org -u "${{ secrets.REGISTRY_MELROY_USER }}" --password-stdin
          docker push registry.melroy.org/bitcoincash/bitcoin-cash-explorer/explorer-frontend:"$UPSTREAM_TAG"
          docker push registry.melroy.org/bitcoincash/bitcoin-cash-explorer/explorer-backend:"$UPSTREAM_TAG"
        shell: bash

      - name: Build service packages
        run: |
          RUST_LOG=debug RUST_BACKTRACE=1 make
          echo ""
          echo "SHA256SUMs:"
          sha256sum *.s9pk
        shell: bash

      - name: Generate changelog
        id: meta
        run: |
          FIRST_S9PK=$(ls *.s9pk | head -1)
          TITLE=$(start-cli s9pk inspect "$FIRST_S9PK" manifest | jq -r '.title')
          VERSION=$(start-cli s9pk inspect "$FIRST_S9PK" manifest | jq -r '.version')
          UPSTREAM_TAG="${VERSION%%:*}"
          RELEASE_NOTES=$(start-cli s9pk inspect "$FIRST_S9PK" manifest | jq -r '.releaseNotes // "No release notes provided."')
          {
            echo "## What's Changed"
            echo ""
            echo "Version: ${VERSION}"
            echo ""
            echo "Upstream tag: ${UPSTREAM_TAG}"
            echo ""
            echo "${RELEASE_NOTES}"
            echo ""
            echo "## SHA256 Hashes"
            echo '```'
            sha256sum *.s9pk
            echo '```'
          } > change-log.txt
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${UPSTREAM_TAG}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Move release tag to current commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git tag -f "${{ steps.meta.outputs.tag }}"
          git push origin -f "${{ steps.meta.outputs.tag }}"

      - name: Publish versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }} ${{ steps.meta.outputs.version }}
          prerelease: false
          body_path: change-log.txt
          files: ./*.s9pk


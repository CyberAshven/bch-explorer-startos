name: Build Service

on:
  workflow_dispatch:
  pull_request:
    paths-ignore: ['*.md']
    branches: ['master']
  push:
    paths-ignore: ['*.md']
    branches: ['master']

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      frontend_tag: ${{ steps.meta.outputs.frontend_tag }}
      backend_tag: ${{ steps.meta.outputs.backend_tag }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout BCH Explorer source
        uses: actions/checkout@v4
        with:
          repository: BitcoinCash1/bitcoin-cash-explorer
          ref: main
          path: bch-explorer-src

      - name: Set image tags
        id: meta
        run: |
          SHA=$(git -C bch-explorer-src rev-parse --short HEAD 2>/dev/null || echo "3.7")
          echo "frontend_tag=ghcr.io/${{ github.repository_owner | lower }}/bch-explorer-frontend:$SHA" >> $GITHUB_OUTPUT
          echo "backend_tag=ghcr.io/${{ github.repository_owner | lower }}/bch-explorer-backend:$SHA" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: bch-explorer-src/backend
          build-contexts: |
            rustgbt=bch-explorer-src/rust
            backend=bch-explorer-src/backend
          push: true
          tags: ${{ steps.meta.outputs.backend_tag }},ghcr.io/${{ github.repository_owner | lower }}/bch-explorer-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: bch-explorer-src/frontend
          build-contexts: |
            rustgbt=bch-explorer-src/rust
            backend=bch-explorer-src/backend
          push: true
          tags: ${{ steps.meta.outputs.frontend_tag }},ghcr.io/${{ github.repository_owner | lower }}/bch-explorer-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-s9pk:
    needs: build-images
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Setup build environment
        uses: start9labs/shared-workflows/.github/actions/setup-build-env@master

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Find or create developer signing key
        run: |
          if [ -n "${{ secrets.DEV_KEY }}" ]; then
            mkdir -p ~/.startos
            printf '%s' "${{ secrets.DEV_KEY }}" > ~/.startos/developer.key.pem
          else
            start-cli init-key
          fi
        shell: bash

      - name: Patch manifest with built image tags
        run: |
          BACKEND_TAG="${{ needs.build-images.outputs.backend_tag }}"
          FRONTEND_TAG="${{ needs.build-images.outputs.frontend_tag }}"
          sed -i "s|registry.melroy.org/bitcoincash/bitcoin-cash-explorer/explorer-backend:3.7|$BACKEND_TAG|g" startos/manifest.ts
          sed -i "s|registry.melroy.org/bitcoincash/bitcoin-cash-explorer/explorer-frontend:3.7|$FRONTEND_TAG|g" startos/manifest.ts
        shell: bash

      - name: Build service packages
        run: |
          RUST_LOG=debug RUST_BACKTRACE=1 make
          echo ""
          echo "SHA256SUMs:"
          sha256sum *.s9pk
        shell: bash

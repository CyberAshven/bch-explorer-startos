name: Release Service

on:
  push:
    branches: ['master']
    paths-ignore: ['*.md']
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Publish as pre-release?'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      frontend_tag: ${{ steps.meta.outputs.frontend_tag }}
      backend_tag: ${{ steps.meta.outputs.backend_tag }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout BCH Explorer source
        uses: actions/checkout@v4
        with:
          repository: BitcoinCash1/bitcoin-cash-explorer
          ref: main
          path: bch-explorer-src

      - name: Set image tags
        id: meta
        run: |
          SHA=$(git -C bch-explorer-src rev-parse --short HEAD 2>/dev/null || echo "3.7")
          echo "frontend_tag=ghcr.io/cyberashven/bch-explorer-frontend:$SHA" >> $GITHUB_OUTPUT
          echo "backend_tag=ghcr.io/cyberashven/bch-explorer-backend:$SHA" >> $GITHUB_OUTPUT

      - name: Prepare Docker build contexts (copy Dockerfiles into source dirs)
        run: cd bch-explorer-src && sh docker/init.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: bch-explorer-src/backend
          build-contexts: |
            rustgbt=bch-explorer-src/rust
            backend=bch-explorer-src/backend
          push: true
          tags: ${{ steps.meta.outputs.backend_tag }},ghcr.io/cyberashven/bch-explorer-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: bch-explorer-src/frontend
          push: true
          tags: ${{ steps.meta.outputs.frontend_tag }},ghcr.io/cyberashven/bch-explorer-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - name: Setup build environment
        uses: start9labs/shared-workflows/.github/actions/setup-build-env@master

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Find or create developer signing key
        run: |
          if [ -n "${{ secrets.DEV_KEY }}" ]; then
            mkdir -p ~/.startos
            printf '%s' "${{ secrets.DEV_KEY }}" > ~/.startos/developer.key.pem
          else
            start-cli init-key
          fi
        shell: bash

      - name: Patch manifest with GHCR image tags
        run: |
          sed -i "s|registry.melroy.org/bitcoincash/bitcoin-cash-explorer/explorer-backend:3.7|${{ needs.build-images.outputs.backend_tag }}|g" startos/manifest.ts
          sed -i "s|registry.melroy.org/bitcoincash/bitcoin-cash-explorer/explorer-frontend:3.7|${{ needs.build-images.outputs.frontend_tag }}|g" startos/manifest.ts
        shell: bash

      - name: Build service packages
        run: |
          RUST_LOG=debug RUST_BACKTRACE=1 make
          echo ""
          echo "SHA256SUMs:"
          sha256sum *.s9pk
        shell: bash

      - name: Generate changelog
        run: |
          FIRST_S9PK=$(ls *.s9pk | head -1)
          RELEASE_NOTES=$(start-cli s9pk inspect "$FIRST_S9PK" manifest \
            | jq -r '.releaseNotes // "No release notes provided."')
          {
            echo "## What's Changed"
            echo ""
            echo "${RELEASE_NOTES}"
            echo ""
            echo "## SHA256 Hashes"
            echo '```'
            sha256sum *.s9pk
            echo '```'
          } > change-log.txt
        shell: bash

      - name: Set release metadata
        id: meta
        run: |
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            echo "tag=pre-release" >> $GITHUB_OUTPUT
            echo "name=BCH Explorer — Pre-release" >> $GITHUB_OUTPUT
            echo "is_pre=true" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "name=BCH Explorer — Latest Stable" >> $GITHUB_OUTPUT
            echo "is_pre=false" >> $GITHUB_OUTPUT
          fi

      - name: Move release tag to current commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git tag -f ${{ steps.meta.outputs.tag }}
          git push origin -f ${{ steps.meta.outputs.tag }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.is_pre }}
          body_path: change-log.txt
          files: ./*.s9pk
